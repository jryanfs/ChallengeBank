services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: challengerbank-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ChallengeBank@123"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/127.0.0.1/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: challengerbank-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: challengerbank-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  notifications-worker:
    build:
      context: ..
      dockerfile: challengerbank/Dockerfile.notifications
    container_name: challengerbank-notifications-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      RabbitMq__HostName: "rabbitmq"
      RabbitMq__Port: 5672
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      RabbitMq__Exchange: "challengebank.events"
      RabbitMq__QueueBankingDetailsUpdated: "notifications.clients.bankingdetails.updated"
      RabbitMq__RoutingKeyBankingDetailsUpdated: "clients.bankingdetails.updated"
      SendGrid__ApiKey: ${SENDGRID_API_KEY:-}
      SendGrid__FromEmail: ${SENDGRID_FROM_EMAIL:-}
      SendGrid__FromName: ${SENDGRID_FROM_NAME:-ChallengeBank}
      SendGrid__OverrideRecipientEmail: ${SENDGRID_OVERRIDE_TO:-}
    depends_on:
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  clients-api:
    build:
      context: ..
      dockerfile: challengerbank/Dockerfile.clients
    container_name: challengerbank-clients-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__ChallengeBankDb: "Server=sqlserver,1433;Database=ChallengeBank;User Id=sa;Password=ChallengeBank@123;TrustServerCertificate=True;MultipleActiveResultSets=true;Connect Timeout=30"
    ports:
      - "7101:8081"
      - "5101:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: unless-stopped

  transactions-api:
    build:
      context: ..
      dockerfile: challengerbank/Dockerfile.transactions
    container_name: challengerbank-transactions-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__ChallengeBankDb: "Server=sqlserver,1433;Database=ChallengeBank;User Id=sa;Password=ChallengeBank@123;TrustServerCertificate=True;MultipleActiveResultSets=true;Connect Timeout=30"
      ClientsService__BaseUrl: "http://clients-api:8080"
      Redis__ConnectionString: "redis:6379"
      Redis__KeyPrefix: "challengebank"
      Redis__TransferDuplicateWindowMinutes: "5"
    ports:
      - "7102:8081"
      - "5102:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      clients-api:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlserver-data:
  redis-data:
